name: pang_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.2
  - pytorch-cuda=12.1
  - pip
  - pip:
      - setuptools==75.0.0
      - h5py==3.10.0
      - numpy<2
      - pandas
      - pyarrow
      - scipy
      - tqdm
      - pysam
      - biopython
